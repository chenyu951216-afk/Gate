{% extends "base.html" %}
{% block title %}歷史重播｜Gate Quant Scanner{% endblock %}
{% block content %}<section class="panel"><h1>歷史重播</h1><p>每次只重建一個 30 分鐘時間點。只能選整點或半點：選 02:00 就使用 02:00 收盤 K；選 02:30 就使用 02:30 收盤 K，不需要填結束時間。</p><form id="replay-form"><label>重播日期與時間 <input id="replay-start" name="start_time" type="datetime-local" step="1800" required></label><label>時區 <input name="timezone" value="Asia/Taipei" readonly></label><label>TOP N <input name="top_n" type="number" min="1" max="10" value="10"></label><input name="interval_minutes" type="hidden" value="30"><label class="check"><input name="include_details" type="checkbox" checked>完整指標</label><label class="check"><input name="send_discord" type="checkbox">傳送 Discord</label><button class="button" type="submit">執行這個 30 分鐘時點</button></form><div id="replay-progress" class="progress"></div></section>{% endblock %}{% block scripts %}<script src="/static/js/replay.js"></script>{% endblock %}
